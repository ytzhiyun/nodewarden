<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'unsafe-inline'; connect-src 'self'; base-uri 'none'; form-action 'none'"
    />
    <title>NodeWarden WebAuthn Connector</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      button {
        width: 100%;
        min-height: 40px;
        padding: 8px 14px;
        border: 1px solid #2563eb;
        border-radius: 10px;
        background: #2563eb;
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        line-height: 1.2;
        transition: background-color 160ms ease, border-color 160ms ease;
      }

      button:hover {
        border-color: #1d4ed8;
        background: #1d4ed8;
      }

      button:focus-visible {
        outline: 2px solid #2563eb;
        outline-offset: 2px;
      }

      button[aria-disabled="true"] {
        border-color: #d0d5dd;
        background: #d0d5dd;
        color: #667085;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <button id="webauthn-button" type="button" aria-live="polite">Read security key</button>
    <script type="module" src="/webauthn-connector.js"></script>
  </body>
</html>
